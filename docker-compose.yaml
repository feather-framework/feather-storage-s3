services:
    minio:
        build:
            context: .
            dockerfile: docker/minio/Dockerfile
        ports:
            - '9000:9000'
            - '9001:9001'
        environment:
            MINIO_ROOT_USER: miniouser
            MINIO_ROOT_PASSWORD: miniopassword
            MINIO_ACCESS_KEY_ID: cHXky6PdP5WGhrC5MMyd
            MINIO_SECRET_ACCESS_KEY: 7diqcEnfBESz9MurK4HiNd4WgVydhj6AIZw1Hj9Q
            MINIO_REGION_NAME: us-east-1
            MINIO_BUCKET_NAME: miniobucket
        volumes:
            - 'miniodata:/data'
        healthcheck:
            test:
                - CMD
                - mc
                - ready
                - local
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    miniodata:
